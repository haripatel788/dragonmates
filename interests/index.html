<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Interests List</title>
  <script
    async
    crossorigin="anonymous"
    data-clerk-publishable-key="pk_test_a2V5LXRpY2stNzQuY2xlcmsuYWNjb3VudHMuZGV2JA"
    src="https://key-tick-74.clerk.accounts.dev/npm/@clerk/clerk-js@latest/dist/clerk.browser.js"
    type="text/javascript"
  ></script>
</head>
<body>
  <script>
    window.addEventListener('load', async () => {
      await window.Clerk.load();
      if (!window.Clerk.user) {
        window.location.href = '/auth/login';
      }
    });
  </script>

  <h1>Enter Your Interests</h1>

  <input type="text" id="interestInput" placeholder="Type an interest">
  <button onclick="addInterest()">Add</button>

  <h2>Interests</h2>

  <ul id="interestList"></ul>

  <script>
    function addInterest() {
      const input = document.getElementById("interestInput");
      const value = input.value.trim();

      if (value === "") return;

      const li = document.createElement("li");
      li.textContent = value;

      document.getElementById("interestList").appendChild(li);
      input.value = "";
    }
  </script>

</body>
</html>
