<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse Roommates - Dragonmates</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script
        async
        crossorigin="anonymous"
        data-clerk-publishable-key="pk_test_a2V5LXRpY2stNzQuY2xlcmsuYWNjb3VudHMuZGV2JA"
        src="https://key-tick-74.clerk.accounts.dev/npm/@clerk/clerk-js@5/dist/clerk.browser.js"
        type="text/javascript"
    ></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'drexel-blue': '#07294D',
                        'drexel-gold': '#FFC600',
                        'drexel-light-blue': '#1E4D7B',
                        'drexel-dark-blue': '#041E42',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gradient-to-br from-gray-50 to-gray-100 min-h-screen p-5">
    <script>
        window.addEventListener('load', async () => {
            await window.Clerk.load();
            if (!window.Clerk.user) {
                window.location.href = '/auth/login';
            }
        });
    </script>

    <div class="max-w-6xl mx-auto">
        <header class="flex items-center gap-4 mb-6 p-4 bg-white rounded-xl shadow-sm">
            <a href="/" class="flex items-center gap-2 text-drexel-blue font-medium px-3 py-2 rounded-lg hover:bg-gray-100 transition-colors">
                <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                    <path d="M12.5 15L7.5 10L12.5 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                Home
            </a>
            <h1 class="text-2xl font-bold text-drexel-blue flex-1">Browse Roommates</h1>
            <a href="/profile" class="px-4 py-2 text-drexel-blue font-medium rounded-lg hover:bg-gray-100 transition-colors">My Profile</a>
            <a href="/interests" class="px-4 py-2 bg-drexel-gold text-drexel-blue font-semibold rounded-lg hover:bg-amber-400 transition-colors">Preferences</a>
        </header>

        <p class="text-gray-600 mb-6">Find compatible roommates based on your preferences.</p>

        <div id="profileGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Profile cards populated by JS -->
        </div>
    </div>

    <script src="profiles-data.js"></script>
    <script src="match-score.js"></script>
    <script>
        const HOBBY_EMOJI = { gaming: '🎮', reading: '📚', fitness: '🏋️', movies: '🎬', cooking: '🍳', music: '🎵', travel: '✈️', art: '🎨', sports: '⚽', outdoors: '🌲', photography: '📷', coding: '💻' };

        function getMyPrefs() {
            try {
                return JSON.parse(localStorage.getItem('roommatePrefs') || '{}');
            } catch { return {}; }
        }

        function renderCards() {
            const me = getMyPrefs();
            const grid = document.getElementById('profileGrid');
            const profiles = Object.entries(typeof PROFILES_RAW !== 'undefined' ? PROFILES_RAW : {}).map(([id, p]) => {
                let matchScore = 0;
                try {
                    matchScore = typeof calculateMatchScore === 'function'
                        ? calculateMatchScore(me, { dealbreakers: p.dealbreakers || {}, scores: p.scores || {}, personal: p.personal || {} })
                        : 75;
                    if (matchScore === 0) matchScore = 75;
                } catch (e) {
                    matchScore = 75;
                }
                const display = typeof formatProfileForDisplay === 'function' ? formatProfileForDisplay(p) : p;
                return { id, ...display, matchScore };
            }).sort((a, b) => b.matchScore - a.matchScore);

            grid.innerHTML = profiles.map(p => {
                const hobbyTags = (p.hobbies || []).slice(0, 3).map(h => {
                    const emoji = HOBBY_EMOJI[h] || '•';
                    return `<span class="px-2 py-1 bg-gray-100 text-gray-700 rounded-full text-xs">${emoji} ${(h + '').charAt(0).toUpperCase() + (h + '').slice(1)}</span>`;
                }).join('');
                return `
                    <a href="/browse/view?id=${p.id}" class="block bg-white rounded-2xl shadow-lg overflow-hidden hover:shadow-xl hover:-translate-y-1 transition-all">
                        <div class="bg-gradient-to-br from-drexel-blue to-drexel-light-blue p-6 flex items-center gap-4">
                            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=${p.id}" alt="" class="w-16 h-16 rounded-full border-3 border-white object-cover bg-white">
                            <div class="flex-1 min-w-0">
                                <h3 class="text-lg font-bold text-white truncate">${p.name}</h3>
                                <p class="text-drexel-gold font-medium text-sm">${p.major}</p>
                                <p class="text-white/80 text-sm">${p.year}</p>
                            </div>
                            <div class="text-right">
                                <div class="text-2xl font-bold text-drexel-gold">${p.matchScore}%</div>
                                <div class="text-xs text-white/80">Match</div>
                            </div>
                        </div>
                        <div class="p-4">
                            <div class="flex flex-wrap gap-2 mb-3">${hobbyTags}</div>
                            <div class="text-xs text-gray-600 space-y-1">
                                <p>🛌 ${p.sleepSchedule} · ✨ ${p.cleanliness}</p>
                                <p>🏠 ${p.budget}</p>
                            </div>
                        </div>
                    </a>
                `;
            }).join('');
        }

        renderCards();
    </script>
</body>
</html>
