<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Dragonmates</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script
        async
        crossorigin="anonymous"
        data-clerk-publishable-key="pk_test_a2V5LXRpY2stNzQuY2xlcmsuYWNjb3VudHMuZGV2JA"
        src="https://key-tick-74.clerk.accounts.dev/npm/@clerk/clerk-js@5/dist/clerk.browser.js"
        type="text/javascript"
    ></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'drexel-blue': '#07294D',
                        'drexel-gold': '#FFC600',
                        'drexel-light-blue': '#1E4D7B',
                        'drexel-dark-blue': '#041E42',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gradient-to-br from-gray-50 to-gray-100 min-h-screen p-5">
    <script>
        window.addEventListener('load', async () => {
            const hasLegacyToken = Boolean(localStorage.getItem('token'));
            if (window.Clerk?.load) {
                await window.Clerk.load();
            }
            if (!window.Clerk?.user && !hasLegacyToken) {
                window.location.href = '/auth/login';
            }
        });
    </script>

    <div class="max-w-4xl mx-auto">
        <header class="flex items-center gap-4 mb-6 p-4 bg-white rounded-xl shadow-sm">
            <a href="/browse" class="flex items-center gap-2 text-drexel-blue font-medium px-3 py-2 rounded-lg hover:bg-gray-100 transition-colors">
                <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                    <path d="M12.5 15L7.5 10L12.5 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                Back to Browse
            </a>
            <h1 class="text-2xl font-bold text-drexel-blue flex-1">Profile</h1>
        </header>

        <div id="profileContent" class="bg-white rounded-2xl shadow-lg overflow-hidden">
            <!-- Populated by JS -->
        </div>
    </div>

    <script src="../profiles-data.js"></script>
    <script src="../match-score.js"></script>
    <script>
        const HOBBY_EMOJI = { gaming: '🎮', reading: '📚', fitness: '🏋️', movies: '🎬', cooking: '🍳', music: '🎵', travel: '✈️', art: '🎨', sports: '⚽', outdoors: '🌲', photography: '📷', coding: '💻' };

        function getMyPrefs() {
            try {
                return JSON.parse(localStorage.getItem('roommatePrefs') || '{}');
            } catch { return {}; }
        }

        function getProfileId() {
            const params = new URLSearchParams(window.location.search);
            return params.get('id') || '1';
        }

        function renderProfile() {
            const id = getProfileId();
            const raw = (typeof PROFILES_RAW !== 'undefined' ? PROFILES_RAW[id] || PROFILES_RAW['1'] : null) || {};
            const me = getMyPrefs();
            let matchScore = 75;
            try {
                if (typeof calculateMatchScore === 'function') {
                    matchScore = calculateMatchScore(me, { dealbreakers: raw.dealbreakers || {}, scores: raw.scores || {}, personal: raw.personal || {} });
                }
            } catch (e) {}
            const p = formatProfileForDisplay(raw);
            const content = document.getElementById('profileContent');

            const hobbyTags = (p.hobbies || []).map(h => {
                const emoji = HOBBY_EMOJI[h] || '•';
                const label = h.charAt(0).toUpperCase() + h.slice(1);
                return `<span class="px-5 py-2.5 bg-gradient-to-br from-drexel-blue to-drexel-light-blue text-white rounded-full font-medium">${emoji} ${label}</span>`;
            }).join('');

            content.innerHTML = `
                <div class="bg-gradient-to-br from-drexel-blue to-drexel-light-blue p-10 flex items-center gap-6 flex-wrap">
                    <div class="relative">
                        <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=${id}" alt="" class="w-32 h-32 rounded-full border-4 border-white shadow-lg object-cover bg-white">
                        <div class="absolute bottom-2 right-2 w-5 h-5 bg-green-500 border-2 border-white rounded-full"></div>
                    </div>
                    <div class="flex-1 min-w-[250px]">
                        <h2 class="text-4xl font-bold text-white mb-1">${p.name}</h2>
                        <p class="text-lg text-drexel-gold font-medium mb-1">${p.major}</p>
                        <p class="text-white/90 mb-4">${p.year}</p>
                        <div class="flex gap-2 flex-wrap">
                            <span class="px-4 py-1.5 bg-white/20 backdrop-blur-sm text-white rounded-full text-sm font-medium">Looking for Housing</span>
                            <span class="px-4 py-1.5 bg-drexel-gold text-drexel-blue rounded-full text-sm font-medium">✓ Verified Student</span>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-px bg-gray-200 border-b border-gray-200">
                    <div class="bg-white p-6 text-center">
                        <div class="text-3xl font-bold text-drexel-blue mb-1">${matchScore}%</div>
                        <div class="text-sm text-gray-600 font-medium">Match Score</div>
                    </div>
                    <div class="bg-white p-6 text-center">
                        <div class="text-3xl font-bold text-drexel-blue mb-1">Fast</div>
                        <div class="text-sm text-gray-600 font-medium">Response Time</div>
                    </div>
                    <div class="bg-white p-6 text-center">
                        <div class="text-3xl font-bold text-drexel-blue mb-1">Available</div>
                        <div class="text-sm text-gray-600 font-medium">Status</div>
                    </div>
                </div>

                <div class="p-8 border-b border-gray-200">
                    <h3 class="text-xl font-bold text-drexel-blue mb-4 flex items-center gap-2">
                        <div class="w-1 h-6 bg-drexel-gold rounded"></div> About Me
                    </h3>
                    <p class="text-gray-700 leading-relaxed">${p.about}</p>
                </div>

                <div class="p-8 border-b border-gray-200">
                    <h3 class="text-xl font-bold text-drexel-blue mb-4 flex items-center gap-2">
                        <div class="w-1 h-6 bg-drexel-gold rounded"></div> Lifestyle Preferences
                    </h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="flex items-center gap-3 p-4 bg-gray-50 rounded-xl"><span class="text-3xl">🛌</span><div><div class="text-xs text-gray-600">Sleep Schedule</div><div class="font-semibold text-drexel-blue">${p.sleepSchedule}</div></div></div>
                        <div class="flex items-center gap-3 p-4 bg-gray-50 rounded-xl"><span class="text-3xl">🎵</span><div><div class="text-xs text-gray-600">Noise Level</div><div class="font-semibold text-drexel-blue">${p.noiseLevel}</div></div></div>
                        <div class="flex items-center gap-3 p-4 bg-gray-50 rounded-xl"><span class="text-3xl">✨</span><div><div class="text-xs text-gray-600">Cleanliness</div><div class="font-semibold text-drexel-blue">${p.cleanliness}</div></div></div>
                        <div class="flex items-center gap-3 p-4 bg-gray-50 rounded-xl"><span class="text-3xl">👥</span><div><div class="text-xs text-gray-600">Guests</div><div class="font-semibold text-drexel-blue">${p.guests}</div></div></div>
                        <div class="flex items-center gap-3 p-4 bg-gray-50 rounded-xl"><span class="text-3xl">🍳</span><div><div class="text-xs text-gray-600">Cooking</div><div class="font-semibold text-drexel-blue">${p.cookingHabits}</div></div></div>
                        <div class="flex items-center gap-3 p-4 bg-gray-50 rounded-xl"><span class="text-3xl">🎭</span><div><div class="text-xs text-gray-600">Personality</div><div class="font-semibold text-drexel-blue">${p.personality}</div></div></div>
                    </div>
                </div>

                <div class="p-8 border-b border-gray-200">
                    <h3 class="text-xl font-bold text-drexel-blue mb-4 flex items-center gap-2">
                        <div class="w-1 h-6 bg-drexel-gold rounded"></div> Interests & Hobbies
                    </h3>
                    <div class="flex flex-wrap gap-3">${hobbyTags}</div>
                </div>

                <div class="p-8 border-b border-gray-200">
                    <h3 class="text-xl font-bold text-drexel-blue mb-4 flex items-center gap-2">
                        <div class="w-1 h-6 bg-drexel-gold rounded"></div> Housing Preferences
                    </h3>
                    <div class="space-y-4">
                        <div class="flex justify-between p-4 bg-gray-50 rounded-lg"><span class="text-gray-600">Budget</span><span class="font-semibold text-drexel-blue">${p.budget}</span></div>
                        <div class="flex justify-between p-4 bg-gray-50 rounded-lg"><span class="text-gray-600">Move-in</span><span class="font-semibold text-drexel-blue">${p.moveInDate}</span></div>
                        <div class="flex justify-between p-4 bg-gray-50 rounded-lg"><span class="text-gray-600">Lease</span><span class="font-semibold text-drexel-blue">${p.leaseDuration}</span></div>
                        <div class="flex justify-between p-4 bg-gray-50 rounded-lg"><span class="text-gray-600">Room Type</span><span class="font-semibold text-drexel-blue">${p.roomType}</span></div>
                        <div class="flex justify-between p-4 bg-gray-50 rounded-lg"><span class="text-gray-600">Smoking</span><span class="font-semibold text-drexel-blue">${p.smoking}</span></div>
                        <div class="flex justify-between p-4 bg-gray-50 rounded-lg"><span class="text-gray-600">Pets</span><span class="font-semibold text-drexel-blue">${p.pets}</span></div>
                    </div>
                </div>

                <div class="p-8">
                    <button onclick="sendMessage()" class="w-full flex items-center justify-center gap-2 px-6 py-4 bg-gradient-to-br from-drexel-blue to-drexel-light-blue text-white font-semibold rounded-xl shadow-md hover:-translate-y-0.5 hover:shadow-lg transition-all">
                        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                            <path d="M18 2L9 11M18 2L12 18L9 11M18 2L2 8L9 11" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                        Send Message
                    </button>
                </div>
            `;
        }

        function sendMessage() {
            window.location.href = '/chat';
        }

        renderProfile();
    </script>
</body>
</html>
