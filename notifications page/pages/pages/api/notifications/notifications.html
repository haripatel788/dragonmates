<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Notifications</title>
</head>
<!-- FIX 1: userId injected server-side via data attribute -->
<body data-user-id="{{SIGNED_IN_USER_ID}}">
  <h1>Notifications</h1>
  <ul id="notificationsList">
    <li>Loading notifications...</li>
  </ul>

  <script>
    const notificationsList = document.getElementById("notificationsList");

    // FIX 1: Read userId from the data attribute instead of a hardcoded placeholder
    const userId = document.body.dataset.userId;

    async function loadNotifications() {
      notificationsList.innerHTML = "<li>Loading notifications...</li>";

      try {
        const response = await fetch(`/api/notifications?userId=${userId}`);
        const data = await response.json();

        if (!data || data.length === 0) {
          notificationsList.innerHTML = "<li>No notifications yet</li>";
          return;
        }

        notificationsList.innerHTML = "";

        data.forEach((notif) => {
          const li = document.createElement("li");
          li.textContent = notif.message;

          if (!notif.read) {
            const button = document.createElement("button");
            button.textContent = "Mark as read";
            button.onclick = async () => {
              try {
                // FIX 3: Handle fetch failure instead of silently ignoring it
                const res = await fetch(`/api/notifications/read`, {
                  method: "POST",
                  headers: { "Content-Type": "application/json" },
                  body: JSON.stringify({ notificationId: notif.id }),
                });
                if (!res.ok) throw new Error("Failed to mark as read");

                // FIX 2: Remove button BEFORE setting textContent, 
                // otherwise textContent wipes the button and button.remove() throws
                button.remove();
                li.textContent = notif.message + " (read)";
              } catch (err) {
                console.error("Could not mark notification as read:", err);
              }
            };
            li.appendChild(button);
          }

          notificationsList.appendChild(li);
        });
      } catch (err) {
        notificationsList.innerHTML = "<li>Error loading notifications</li>";
        console.error(err);
      }
    }

    loadNotifications();
  </script>
</body>
</html>
