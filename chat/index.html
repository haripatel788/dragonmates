<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roommate Chat - Dragonmates</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script
        async
        crossorigin="anonymous"
        data-clerk-publishable-key="pk_test_a2V5LXRpY2stNzQuY2xlcmsuYWNjb3VudHMuZGV2JA"
        src="https://key-tick-74.clerk.accounts.dev/npm/@clerk/clerk-js@5/dist/clerk.browser.js"
        type="text/javascript"
    ></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'drexel-blue': '#07294D',
                        'drexel-gold': '#FFC600',
                        'drexel-light-blue': '#1E4D7B'
                    }
                }
            }
        };
    </script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gradient-to-br from-gray-50 to-gray-100 min-h-screen">
    <div class="max-w-4xl mx-auto p-5">
        <header class="bg-white rounded-xl shadow-sm p-4 flex items-center gap-4 mb-4">
            <a href="/browse" class="text-drexel-blue font-medium px-3 py-2 rounded-lg hover:bg-gray-100 transition-colors">&larr; Browse</a>
            <h1 id="roommate-name" class="text-xl font-bold text-drexel-blue flex-1">Roommate Chat</h1>
            <a href="/profile" class="text-drexel-blue font-medium px-3 py-2 rounded-lg hover:bg-gray-100 transition-colors">My Profile</a>
        </header>

        <section class="bg-white rounded-2xl shadow-lg overflow-hidden">
            <div id="chat-box" class="h-[60vh] overflow-y-auto p-4 flex flex-col gap-3"></div>
            <div id="chat-status" class="px-4 pb-2 text-sm text-gray-500 hidden"></div>
            <div class="border-t p-4 flex gap-2 bg-gray-50">
                <input id="message-input" type="text" class="flex-1 border border-gray-300 rounded-xl px-4 py-2.5 focus:ring-2 focus:ring-drexel-gold outline-none" placeholder="Type a message...">
                <button id="send-button" class="bg-gradient-to-br from-drexel-blue to-drexel-light-blue text-white px-5 py-2.5 rounded-xl font-semibold">Send</button>
            </div>
        </section>
    </div>
    <script src="script.js"></script>
</body>
</html>
