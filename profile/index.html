<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'drexel-blue': '#07294D',
                        'drexel-gold': '#FFC600',
                        'drexel-light-blue': '#1E4D7B',
                        'drexel-dark-blue': '#041E42',
                    }
                }
            }
        }
    </script>
</head>
<body>
    <div class="bg-gradient-to-br from-gray-50 to bg-gray-100 min-h-screen p-5">
        <header class="flex items-cnter gap-4 mb-6 p-4 bg-white rounded-xl shadow-sm">
            <button class="flex items-center gap-2 text-drexel-blue font-medium px-3 py-2 rounded-lg hover:bg-gray-100 transition-colors" onclick="goBack()">
                <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                    <path d="M12.5 15L7.5 10L12.5 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                Back
            </button>

            <h1 class="text-2xl font-bold text-drexel-blue flex-1">Student Profile</h1>
        </header>
    </div>
    <script src="script.js"></script>
</body>
</html>
