<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Living Style & Preferences</title>
    <link rel="stylesheet" href="style.css">
    <script
        async
        crossorigin="anonymous"
        data-clerk-publishable-key="pk_test_a2V5LXRpY2stNzQuY2xlcmsuYWNjb3VudHMuZGV2JA"
        src="https://key-tick-74.clerk.accounts.dev/npm/@clerk/clerk-js@5/dist/clerk.browser.js"
        type="text/javascript"
    ></script>
</head>
<body>

    <form>

        <h1>Living Style & Preferences</h1>

        <!-- Sleep Schedule -->
        <div>
            <label>Sleep Schedule</label>
            <select id="sleepSchedule">
                <option>Select...</option>
                <option>Early Bird</option>
                <option>Night Owl</option>
            </select>
        </div>

        <!-- Cleanliness -->
        <div>
            <label>Cleanliness</label>
            <select id="cleanliness">
                <option>Select...</option>
                <option>Very Clean</option>
                <option>Moderate</option>
                <option>Relaxed</option>
            </select>
        </div>

        <!-- Noise -->
        <div>
            <label>Noise Preference</label>
            <select id="noise">
                <option>Select...</option>
                <option>Quiet</option>
                <option>Moderate</option>
                <option>Loud</option>
            </select>
        </div>

        <!-- Guests -->
        <div>
            <label>Guests</label>
            <select id="guests">
                <option>Select...</option>
                <option>Rarely</option>
                <option>Occasionally</option>
                <option>Frequently</option>
            </select>
        </div>

        <div>
            <label>Pets</label>
            <select id="pets">
                <option>Select...</option>
                <option>Have pets</option>
                <option>Okay with pets</option>
                <option>Not okay with pets</option>
            </select>
        </div>

        <!-- Social Lifestyle -->
        <div>
            <label>Social Lifestyle</label>
            <select>
                <option>Select...</option>
                <option>Stay in mostly</option>
                <option>Go out occasionally</option>
                <option>Go out frequently</option>
            </select>
        </div>

        <!-- Roommate Interaction Style -->
        <div>
            <label>Roommate Interaction Style</label>
            <select>
                <option>Select...</option>
                <option>Very social</option>
                <option>Balanced</option>
                <option>Mostly independent</option>
            </select>
        </div>

        <!-- Shared Responsibilities -->
        <div>
            <label>Shared Responsibilities</label>
            <select>
                <option>Select...</option>
                <option>Strict cleaning schedule</option>
                <option>Rotate chores weekly</option>
                <option>Clean when needed</option>
            </select>
        </div>

        <!-- Cooking Frequency -->
        <div>
            <label>Cooking Frequency</label>
            <select>
                <option>Select...</option>
                <option>Cook daily</option>
                <option>Cook a few times a week</option>
                <option>Rarely cook</option>
            </select>
        </div>

        <!-- Interests -->
        <div>
            <label>Interests (comma separated)</label>
            <input type="text" placeholder="gaming, gym, cooking">
        </div>

        <!-- Buttons -->
        <button type="button" onclick="savePreferences()">Save Preferences</button>
        <button type="button" onclick="loadSaved()">Load Saved</button>

        <p id="profileDisplay"></p>

    </form>

    <script src="script.js"></script>
</body>
</html>
